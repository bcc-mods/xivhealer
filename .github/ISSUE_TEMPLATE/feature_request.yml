name: ✨ 功能建议
description: 提出新功能、交互改进或体验优化
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提建议！先描述你遇到的「问题 / 场景」，再说想要的「方案」，
        比直接给方案更容易讨论。

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 / 场景
      description: 你在使用中遇到了什么不便？什么场景下需要这个功能？
      placeholder: 例：规划长时间轴时，希望能批量复制一段减伤循环到后续阶段。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？有界面想法可以画图或文字描述。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / 现状变通
      description: 现在你是怎么绕过这个问题的？有没有其他实现思路？
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 参考截图、其他工具的类似设计等。
    validations:
      required: false
