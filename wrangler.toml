name = "healerbook"
main = "src/workers/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[triggers]
crons = ["0 */12 * * *", "*/10 * * * *"]

[assets]
directory = "dist/client"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"
run_worker_first = ["/api/*"]

[[kv_namespaces]]
binding = "healerbook"
id = "ff1bfe0cbee0435cada9cbce624ad18b"

[[kv_namespaces]]
binding = "healerbook_snapshots"
id = "ff1bfe0cbee0435cada9cbce624ad18b"

[[d1_databases]]
binding = "healerbook_timelines"
database_name = "healerbook_timelines_dev"
database_id = "937ecb93-3ef7-456e-818b-ff7542b90d1a"

[[durable_objects.bindings]]
name = "TIMELINE_DOC"
class_name = "TimelineDoc"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TimelineDoc"]


# 开发环境
[env.development]
[env.development.vars]
ENVIRONMENT = "development"
FFLOGS_CLIENT_ID = "a15cca7c-686d-4c4b-9d90-c1ee194b7638"

[[env.development.kv_namespaces]]
binding = "healerbook"
id = "ff1bfe0cbee0435cada9cbce624ad18b"

[[env.development.kv_namespaces]]
binding = "healerbook_snapshots"
id = "ff1bfe0cbee0435cada9cbce624ad18b"

[[env.development.durable_objects.bindings]]
name = "TIMELINE_DOC"
class_name = "TimelineDoc"

[[env.development.d1_databases]]
binding = "healerbook_timelines"
database_name = "healerbook_timelines_dev"
database_id = "937ecb93-3ef7-456e-818b-ff7542b90d1a"

# 生产环境
[env.production]
name = "healerbook"
[env.production.vars]
ENVIRONMENT = "production"
RATE_LIMIT_RPM = "30"
CACHE_TTL = "3600"
FFLOGS_CLIENT_ID = "a1263e4f-6950-4100-9a79-f7ebfb94363c"

[[env.production.kv_namespaces]]
binding = "healerbook"
id = "4d48c91437374775b166165a05d56839"

[[env.production.kv_namespaces]]
binding = "healerbook_snapshots"
id = "571cd2c52ccc45c88b22dea53910e163"

[[env.production.durable_objects.bindings]]
name = "TIMELINE_DOC"
class_name = "TimelineDoc"

[[env.production.d1_databases]]
binding = "healerbook_timelines"
database_name = "healerbook_timelines"
database_id = "d5c7c316-c36a-42c7-a00e-aa43ceaba3c8"

# Secrets (通过 wrangler secret 设置)
# v1 API
# wrangler secret put FFLOGS_API_KEY
#
# v2 API (OAuth)
# wrangler secret put FFLOGS_CLIENT_SECRET
#
# 手动同步接口鉴权
# wrangler secret put SYNC_AUTH_TOKEN

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
